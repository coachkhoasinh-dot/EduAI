<style>
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  
  /* Scrollbar gọn gàng */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .dark ::-webkit-scrollbar-thumb { background: #475569; }

  /* Logo Stamp */
  .logo-stamp {
    background-color: #B23A2E;
    border: 2px dashed #E5B5AF;
  }

  /* Nút công tắc Sáng / Tối (Chuẩn thiết kế Day/Night Mode) */
  .theme-switch {
    position: relative;
    width: 156px;
    height: 40px;
    cursor: pointer;
    display: inline-block;
    user-select: none;
    flex-shrink: 0;
  }
  .theme-switch input { display: none; }
  .theme-slider {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #56CCF2 0%, #2F80ED 100%);
    border-radius: 99px;
    transition: 0.4s;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; overflow: hidden;
  }
  /* Trạng thái Tối */
  .theme-switch input:checked + .theme-slider {
    background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
  }
  /* Viên bi */
  .theme-slider::before {
    content: ""; position: absolute;
    height: 32px; width: 32px;
    left: 4px; bottom: 4px;
    background-color: #FFD026;
    border-radius: 50%;
    transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 10;
  }
  /* Hiệu ứng trăng khuyết khi ở chế độ tối */
  .theme-switch input:checked + .theme-slider::before {
    transform: translateX(116px);
    background-color: #E2E8F0;
    box-shadow: inset -8px -3px 0px 0px #94A3B8;
  }
  /* Chữ trạng thái */
  .theme-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 10px;
    letter-spacing: 0.05em; color: #FFFFFF;
    z-index: 8; pointer-events: none;
    transition: 0.4s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .text-dark { opacity: 0; transform: translateX(10px); }
  .text-light { opacity: 1; transform: translateX(32px); }
  
  .theme-switch input:checked + .theme-slider .text-light {
    opacity: 0; transform: translateX(-10px);
  }
  .theme-switch input:checked + .theme-slider .text-dark {
    opacity: 1; transform: translateX(-32px);
  }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fadeIn 0.2s ease-out;
  }
  .modal-box {
    animation: scaleUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>

<script>
/* ============== DATA CONFIGURATION ============== */
const DOCS_PER_CATEGORY = 8;
const CONTACT_PHONE = "0819161835";

const SUBJECTS = [

const DOC_TYPES = [

  {id:'skkn', name:'SKKN', icon:'💡', desc:'Sáng kiến kinh nghiệm dạy học'},
  {id:'stem', name:'Dạy học STEM', icon:'🔬', desc:'Chủ đề, giáo án dạy học STEM'},

const TOPICS = {
  toan:['Các phép tính trong phạm vi 100','Phân số và số thập phân','Hình học phẳng cơ bản','Phương trình – bất phương trình','Hàm số bậc nhất','Thống kê và xác suất','Hình học không gian','Đạo hàm và ứng dụng','Tích phân','Lượng giác'],
  nguvan:['Truyện ngắn hiện đại','Thơ trung đại Việt Nam','Văn nghị luận xã hội','Kĩ năng viết đoạn văn','Văn học dân gian'],
  tienganh:['Family and Friends','School Life','Travel and Tourism','Environment','Grammar: Tenses Review','Technology'],
  khtn:['Chất và sự biến đổi của chất','Vật sống','Năng lượng và sự biến đổi','Trái Đất và bầu trời','Lực và chuyển động','Đa dạng thế giới sống'],
  vatli:['Chuyển động cơ học','Lực và áp suất','Điện học cơ bản','Quang học','Nhiệt học','Điện từ học','Dao động và sóng','Thuyết tương đối hẹp'],
  hoahoc:['Cấu tạo nguyên tử','Bảng tuần hoàn nguyên tố','Phản ứng oxi hoá – khử','Axit – bazơ – muối','Hoá học hữu cơ cơ bản','Polime và vật liệu'],

  tinhoc:['Soạn thảo văn bản','Lập trình Scratch','Mạng máy tính cơ bản','Cơ sở dữ liệu','Lập trình Python','An toàn thông tin'],
  congnghe:['Kĩ thuật trồng trọt','Thiết kế kĩ thuật','An toàn điện trong gia đình','Chế biến thực phẩm'],
  lichsu:['Việt Nam thời kì dựng nước','Phong trào đấu tranh giành độc lập','Lịch sử thế giới cận đại','Cách mạng công nghiệp'],
  dialy:['Địa lí tự nhiên Việt Nam','Dân cư và đô thị hoá','Khí hậu và thuỷ văn','Địa lí kinh tế các vùng'],
  gdcd:['Quyền và nghĩa vụ công dân','Pháp luật hôn nhân – gia đình','Kĩ năng sống và ứng xử','Kinh tế thị trường cơ bản'],
  hdtn:['Khám phá bản thân','Rèn luyện nếp sống','Chủ đề nghề nghiệp','Tham gia hoạt động cộng đồng','Bảo vệ môi trường'],
};

const FORMATS = ['PDF','DOCX','PPTX'];
const AUTHORS = ['EduAI']; 
const PROVINCES = ['Hà Nội','TP. Hồ Chí Minh','Đà Nẵng','Hải Phòng','Cần Thơ','Huế','Nghệ An','Phú Thọ','Thanh Hoá','Bình Dương'];

const LATEST = [
  ['toan',5,'khbd',0],['nguvan',9,'dethi',1],['khtn',8,'ontap',2],['tienganh',6,'khbd',1],
  ['hoahoc',11,'hsg',0],['khtn',7,'sgk',2],['hdtn',10,'khbd',0],['tinhoc',4,'stem',0],
  ['dialy',10,'ontap',1],['congnghe',3,'khgd',0],
];

function range(a,b){const r=[];for(let i=a;i<=b;i++)r.push(i);return r;}
function subjectOf(id){return SUBJECTS.find(s=>s.id===id);}
function doctypeOf(id){return DOC_TYPES.find(t=>t.id===id);}

function strHash(s){let h=0;for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function rngFor(seed){return mulberry32(strHash(seed));}

function buildTitle(docType, subjectName, grade, topic, idx){
  if(docType === 'khbd' && idx === 0) return `Giáo án cả năm môn ${subjectName} lớp ${grade} – Kết Nối Tri Thức`;
  
  switch(docType){
    case 'sgk': return `SGK – SGV – STK môn ${subjectName} lớp ${grade} (Kết Nối Tri Thức)`;
    case 'khgd': return `Kế hoạch giáo dục (PPCT) môn ${subjectName} lớp ${grade} – Kết Nối Tri Thức`;
    case 'khbd': return `Giáo án ${subjectName} lớp ${grade} – Bài ${idx}: ${topic}`;
    case 'dethi': return `Đề kiểm tra môn ${subjectName} lớp ${grade} – ${['Giữa kì 1','Cuối kì 1','Giữa kì 2','Cuối kì 2'][idx%4]} (có đáp án)`;
    case 'ontap': return `Tài liệu ôn tập môn ${subjectName} lớp ${grade} – Chủ đề: ${topic}`;
    case 'hsg': return `Bồi dưỡng học sinh giỏi môn ${subjectName} lớp ${grade} – Chuyên đề: ${topic}`;
    case 'skkn': return `SKKN: Một số biện pháp nâng cao chất lượng dạy học môn ${subjectName} lớp ${grade}`;
    case 'stem': return `Chủ đề STEM môn ${subjectName} lớp ${grade}: ${topic}`;
  }
}

function descFor(docType, subjectName, grade, topic, idx){
  if(docType === 'khbd' && idx === 0) return `Bộ tài liệu tích hợp toàn bộ kế hoạch bài dạy (giáo án) môn ${subjectName} lớp ${grade} đầy đủ cả năm học, biên soạn kĩ lưỡng theo cấu trúc chương trình mới Kết Nối Tri Thức.`;
  
  switch(docType){
    case 'sgk': return `Tài liệu sách môn ${subjectName} lớp ${grade}, biên soạn theo chương trình GDPT 2018 bộ Kết Nối Tri Thức.`;
    case 'khgd': return `Kế hoạch giáo dục và phân phối chương trình môn ${subjectName} lớp ${grade}, bộ sách Kết Nối Tri Thức.`;
    case 'khbd': return `Giáo án (kế hoạch bài dạy) môn ${subjectName} lớp ${grade} cho bài "${topic}".`;
    case 'dethi': return `Đề kiểm tra môn ${subjectName} lớp ${grade}, kèm ma trận, bản đặc tả và đáp án chi tiết.`;
    case 'ontap': return `Tài liệu ôn tập, hệ thống lại kiến thức trọng tâm môn ${subjectName} lớp ${grade} theo chủ đề "${topic}".`;
    case 'hsg': return `Chuyên đề bồi dưỡng học sinh giỏi môn ${subjectName} lớp ${grade} về "${topic}".`;
    case 'skkn': return `Sáng kiến kinh nghiệm chia sẻ biện pháp nâng cao chất lượng dạy học môn ${subjectName} lớp ${grade}.`;
    case 'stem': return `Chủ đề dạy học STEM tích hợp môn ${subjectName} lớp ${grade}: "${topic}".`;
  }
}

function schoolLevel(grade){return grade<=5?'Tiểu học':grade<=9?'THCS':'THPT';}

function generateDoc(subjectId, grade, docType, idx){
  const subject = subjectOf(subjectId);
  const rng = rngFor(`${subjectId}-${grade}-${docType}-${idx}`);
  const topics = TOPICS[subjectId] || ['Chủ đề bài học'];
  const topic = topics[Math.floor(rng()*topics.length)];
  let format = FORMATS[Math.floor(rng()*FORMATS.length)];
  let sizeStr, sizeUnit;

  if(docType === 'khbd' && idx === 0) {
    format = 'DOCX/PPTX';
    sizeStr = (5.0 + rng()*5.0).toFixed(1);
    sizeUnit = 'GB';
  } else {
    sizeStr = (0.4 + rng()*9.6).toFixed(1);
    sizeUnit = 'MB';
  }

  const downloads = Math.floor(200 + rng()*4800);
  const d = new Date(Date.now() - Math.floor(rng()*330)*86400000);
  const dateStr = d.toLocaleDateString('vi-VN');
  
  return {
    subjectId, grade, docType, idx, topic, 
    title: buildTitle(docType, subject.name, grade, topic, idx),
    description: descFor(docType, subject.name, grade, topic, idx),
    edition: 'Kết Nối Tri Thức', author: AUTHORS[0],
    school: `Trường ${schoolLevel(grade)} – ${PROVINCES[Math.floor(rng()*PROVINCES.length)]}`,
    format, sizeStr, sizeUnit, downloads, dateStr
  };
}

    <div class="font-heading font-bold text-slate-900 dark:text-white leading-snug line-clamp-2 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition">${doc.title}</div>

      <span class="font-semibold">${doc.format}</span><span>•</span><span>${doc.sizeStr} ${doc.sizeUnit}</span><span>•</span><span>${doc.dateStr}</span>
    </div>
    <div class="mt-auto pt-3 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center text-[13px] text-orange-600 dark:text-orange-400 font-bold">
      <span class="flex items-center gap-1">📞 Liên hệ</span>

function buildSubjectRow(){
  const navHTML = SUBJECTS.map(s=>`<button class="px-5 py-3 whitespace-nowrap text-sm font-semibold transition-colors border-b-[3px] border-transparent text-white/80 hover:text-white" data-id="${s.id}">${s.icon} ${s.name}</button>`).join('');

  document.getElementById('subjectRow').querySelectorAll('[data-id]').forEach(btn=>{

      const id = btn.dataset.id;
      if(megaState.subjectId === id) closeMegaPanel();
      else openMegaPanel(id);
    });
  });
}

function openMegaPanel(subjectId, grade){
  const subject = subjectOf(subjectId);
  megaState.subjectId = subjectId;
  megaState.grade = grade || subject.grades[0];
  const panel = document.getElementById('megaPanel');
  
  const gradeChips = subject.grades.map(g=>`<button class="px-4 py-1.5 rounded-lg text-sm font-semibold transition ${g===megaState.grade?'bg-primary-600 text-white':'bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700'}" data-grade="${g}">Lớp ${g}</button>`).join('');
  const typeLinks = DOC_TYPES.map(t=>`<a class="flex items-center gap-3 p-3 hover:bg-slate-50 dark:hover:bg-slate-900 rounded-xl transition text-sm font-medium text-slate-900 dark:text-white" href="#/category/${subjectId}/${megaState.grade}/${t.id}"><span class="text-xl">${t.icon}</span> ${t.name}</a>`).join('');
  
  panel.innerHTML = `
    <div class="max-w-[1280px] mx-auto px-4 md:px-6 py-8 grid grid-cols-1 md:grid-cols-2 gap-10">
      <div><h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider font-mono mb-4">Khối lớp</h4><div class="flex flex-wrap gap-2">${gradeChips}</div></div>
      <div><h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider font-mono mb-4">Học liệu lớp ${megaState.grade}</h4><div class="grid grid-cols-2 gap-2">${typeLinks}</div></div>
    </div>`;
  
  panel.classList.remove('hidden');
  panel.querySelectorAll('[data-grade]').forEach(btn=>btn.addEventListener('click', ()=>openMegaPanel(subjectId, parseInt(btn.dataset.grade,10))));
  panel.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMegaPanel));
  highlightActiveTab(subjectId);
}

function closeMegaPanel(){
  megaState = {subjectId:null, grade:null};
  document.getElementById('megaPanel').classList.add('hidden');
  highlightActiveTab(currentRouteSubject());
}

function highlightActiveTab(subjectId){
  document.querySelectorAll('#subjectRow [data-id]').forEach(b=>{
    const isActive = b.dataset.id === subjectId;
    b.classList.toggle('border-white', isActive);
    b.classList.toggle('text-white', isActive);
    b.classList.toggle('text-white/80', !isActive);
  });
}

function currentRouteSubject(){
  const parts = location.hash.slice(2).split('/').filter(Boolean).map(decodeURIComponent);
  return (parts[0]==='subject' || parts[0]==='category' || parts[0]==='doc') ? parts[1] : null;
}

document.addEventListener('click', (e)=>{
  if(megaState.subjectId && !document.querySelector('nav').contains(e.target)) closeMegaPanel();
});

function buildFooter(){
  const links = SUBJECTS.slice(0,6).map(s=>`<a class="block py-1.5 hover:text-white transition text-sm" href="#/subject/${s.id}">${s.icon} Môn ${s.name}</a>`).join('');
  document.getElementById('footerGrid').innerHTML = `
    <div class="md:col-span-2">
      <div class="flex items-center gap-2 mb-4">
        <div class="logo-stamp w-8 h-8 rounded-full flex items-center justify-center font-mono font-bold text-xs text-white">Edu</div>
        <span class="text-xl font-heading font-extrabold text-white">EduAI</span>
      </div>
      <p class="text-sm leading-relaxed max-w-sm">Hệ thống thư viện học liệu chuyên nghiệp, bám sát sách chương trình giáo dục phổ thông 2018 (Kết Nối Tri Thức). Tích hợp các giải pháp công nghệ AI dành cho giáo viên.</p>
    </div>
    <div><h5 class="font-bold text-white mb-4">Danh mục môn học</h5>${links}</div>
    <div><h5 class="font-bold text-white mb-4">Thông tin & Trợ giúp</h5>
      <a href="#" class="block py-1.5 hover:text-white transition text-sm" onclick="showContactModal()">Liên hệ quảng cáo</a>
      <a href="#" class="block py-1.5 hover:text-white transition text-sm" onclick="showContactModal()">Quy định bản quyền</a>
    </div>`;
}

function initTheme() {
  const checkbox = document.getElementById('themeToggleCheckbox');
  const saved = localStorage.getItem('theme');
  if(saved === 'dark'){ document.documentElement.classList.add('dark'); checkbox.checked = true; }
  else { document.documentElement.classList.remove('dark'); checkbox.checked = false; }
  
  checkbox.addEventListener('change', ()=>{
    if(checkbox.checked){ document.documentElement.classList.add('dark'); localStorage.setItem('theme','dark'); }
    else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme','light'); }
  });
}

function render(){
  const parts = location.hash.slice(2).split('/').filter(Boolean).map(decodeURIComponent);
  if(!megaState.subjectId) highlightActiveTab(currentRouteSubject());
  window.scrollTo({top:0, behavior:'instant'});

  if(parts.length===0){ renderHome(); return; }
  if(parts[0]==='subject'){ renderSubjectHub(parts[1]); return; }
  if(parts[0]==='category'){ renderCategory(parts[1], parts[2], parts[3]); return; }
  if(parts[0]==='doc'){ renderDoc(parts[1], parts[2], parts[3], parts[4]); return; }
  renderNotFound();
}

/* Initialize App */
initTheme();
buildSubjectRow();
buildFooter();
window.addEventListener('hashchange', render);
render();

document.getElementById('searchForm').addEventListener('submit', e=>{ e.preventDefault(); location.hash = '#/'; });
document.getElementById('contactBtn').addEventListener('click', showContactModal);
document.getElementById('aiBtn').addEventListener('click', showAIModal);
</script>
</body>
</html>
